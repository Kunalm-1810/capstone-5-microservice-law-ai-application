services:

  # Tier 1 — Frontend (React + nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fe-lawai
    restart: always
    ports:
      - "8090:80"
    depends_on:
      - backend
    networks:
      - lawai-net

  # Tier 2 — Backend (Express API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: be-lawai
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    depends_on:
      - mongo
    networks:
      - lawai-net

  # Tier 3 — Database
  mongo:
    image: mongo:7
    container_name: lawai-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - lawai-net

volumes:
  mongo_data:

networks:
  lawai-net:
